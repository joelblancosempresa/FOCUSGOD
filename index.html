<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ADONAI APP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; background: #000; }

    body { overflow-y: scroll; }

    /* ── Canvas fijo ── */
    #shader-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── Título fijo ── */
    #title {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateZ(0);
      -webkit-transform: translate(-50%, -50%) translateZ(0);
      z-index: 10;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(2rem, 4.2vw, 3.5rem);
      line-height: 1;
      letter-spacing: -0.05em;
      color: #fff;
      text-align: center;
      pointer-events: none;
      will-change: opacity;
    }

    /* ── Scroll hint fijo ── */
    #scroll-hint {
      position: fixed;
      bottom: 1.8rem; left: 50%;
      transform: translateX(-50%) translateZ(0);
      -webkit-transform: translateX(-50%) translateZ(0);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      opacity: 0.3;
      pointer-events: none;
      animation: bounce 2s infinite;
      will-change: opacity;
    }

    #scroll-hint span {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.5rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fff;
    }

    #scroll-hint svg {
      width: 14px; height: 14px;
      stroke: #fff; fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(5px); }
    }

    /* ── Spacer section 1 ── */
    #spacer {
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* gradiente al fondo del spacer */
    #spacer::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50vh;
      background: linear-gradient(to bottom, transparent 0%, #000 85%);
      pointer-events: none;
    }

    /* ── Section 2: Countdown ── */
    #section2 {
      position: relative;
      z-index: 5;
      background: #000;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 2.5rem;
      padding: 3rem 1rem 2rem;
    }

    /* Flip clock */
    .flip-clock {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.5rem;
    }

    .flip-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .flip-digits { display: flex; gap: 0.2rem; }

    .digit {
      width: clamp(2rem, 4vw, 2.5rem);
      height: clamp(2.8rem, 5.5vw, 3.5rem);
      background: #18181b;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: ui-monospace, monospace;
      font-weight: 700;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .digit::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 1px;
      background: rgba(0,0,0,0.5);
      pointer-events: none;
    }

    .digit .val { display: block; }
    .digit .val.anim { animation: flipAnim 0.3s ease; }

    @keyframes flipAnim {
      0%   { transform: translateY(-60%); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .flip-label {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(0.45rem, 0.9vw, 0.6rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .flip-sep {
      font-family: ui-monospace, monospace;
      font-weight: 700;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: #3f3f46;
      padding-bottom: 1.5rem;
      line-height: 1;
    }

    #shimmer-wrap {
      margin-top: 1.5rem;
      overflow: hidden;
      text-align: center;
    }

    #shimmer-text {
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: clamp(0.75rem, 2vw, 1rem);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: linear-gradient(to right,
    transparent 0%,
    transparent 40%,
    rgba(255,255,255,0.95) 50%,
    transparent 60%,
    transparent 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  background-repeat: no-repeat;
  background-size: 220% 100%;
  animation: shimmer 3s infinite linear;
}

@keyframes shimmer {
  0%   { background-position: 120% center; }
  100% { background-position: -20% center; }
}

    @keyframes shimmer {
      0%   { background-position: 100% center; }
      100% { background-position: -10% center; }
    }
  </style>
</head>
<body>

  <!-- Canvas shader de fondo -->
  <canvas id="shader-canvas"></canvas>

  <!-- Título completamente fijo, fuera de todo -->
  <div id="title">ADONAI APP</div>
  <div id="scroll-hint">
    <span>scroll</span>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <!-- Sección 1: solo ocupa espacio para hacer scroll -->
  <div id="spacer"></div>

  <!-- Sección 2: contador -->
  <section id="section2">
    <div class="flip-clock">
      <div class="flip-group">
        <div class="flip-digits">
          <div class="digit"><span class="val" id="d0">0</span></div>
          <div class="digit"><span class="val" id="d1">0</span></div>
        </div>
        <span class="flip-label">Días</span>
      </div>
      <span class="flip-sep">:</span>
      <div class="flip-group">
        <div class="flip-digits">
          <div class="digit"><span class="val" id="h0">0</span></div>
          <div class="digit"><span class="val" id="h1">0</span></div>
        </div>
        <span class="flip-label">Horas</span>
      </div>
      <span class="flip-sep">:</span>
      <div class="flip-group">
        <div class="flip-digits">
          <div class="digit"><span class="val" id="m0">0</span></div>
          <div class="digit"><span class="val" id="m1">0</span></div>
        </div>
        <span class="flip-label">Minutos</span>
      </div>
      <span class="flip-sep">:</span>
      <div class="flip-group">
        <div class="flip-digits">
          <div class="digit"><span class="val" id="s0">0</span></div>
          <div class="digit"><span class="val" id="s1">0</span></div>
        </div>
        <span class="flip-label">Segundos</span>
      </div>
    </div>

  <div id="shimmer-wrap">
      <span id="shimmer-text" data-text="no seas un cristiano promedio">no seas un cristiano promedio</span>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/89/three.min.js"></script>
  <script>
    /* ── Shader sobre canvas nativo ── */
    (function() {
      const canvas = document.getElementById('shader-canvas');
      const camera = new THREE.Camera();
      camera.position.z = 1;
      const scene = new THREE.Scene();
      const geometry = new THREE.PlaneBufferGeometry(2, 2);
      const uniforms = {
        time:       { type: "f",  value: 1.0 },
        resolution: { type: "v2", value: new THREE.Vector2() }
      };
      const material = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
        fragmentShader: `
          precision highp float;
          uniform vec2 resolution;
          uniform float time;
          float random(in float x) { return fract(sin(x)*1e4); }
          float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233)))*43758.5453123); }
          void main(void) {
            vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
            vec2 fMosaicScal = vec2(4.0, 2.0);
            vec2 vScreenSize = vec2(256.0, 256.0);
            uv.x = floor(uv.x * vScreenSize.x / fMosaicScal.x) / (vScreenSize.x / fMosaicScal.x);
            uv.y = floor(uv.y * vScreenSize.y / fMosaicScal.y) / (vScreenSize.y / fMosaicScal.y);
            float t = time * 0.06 + random(uv.x) * 0.4;
            float lineWidth = 0.0008;
            vec3 color = vec3(0.0);
            for(int j = 0; j < 3; j++){
              for(int i = 0; i < 5; i++){
                color[j] += lineWidth * float(i*i) / abs(fract(t - 0.01*float(j) + float(i)*0.01)*1.0 - length(uv));
              }
            }
            gl_FragColor = vec4(color[2], color[1], color[0], 1.0);
          }
        `
      });
      scene.add(new THREE.Mesh(geometry, material));
      const renderer = new THREE.WebGLRenderer({ canvas });
      renderer.setPixelRatio(window.devicePixelRatio);
      function resize() {
        renderer.setSize(window.innerWidth, window.innerHeight);
        uniforms.resolution.value.x = renderer.domElement.width;
        uniforms.resolution.value.y = renderer.domElement.height;
      }
      resize();
      window.addEventListener('resize', resize);
      (function animate() {
        requestAnimationFrame(animate);
        uniforms.time.value += 0.06;
        renderer.render(scene, camera);
      })();
    })();

    /* ── Fade out título y scroll-hint al bajar ── */
    const titleEl = document.getElementById('title');
    const hintEl  = document.getElementById('scroll-hint');
    const vh = window.innerHeight;
    function onScroll() {
      const s = window.scrollY;
      const op = Math.max(0, 1 - s / (vh * 0.4));
      titleEl.style.opacity = op;
      hintEl.style.opacity  = op * 0.3;
    }
    window.addEventListener('scroll', onScroll, { passive: true });

    /* ── Countdown ── */
    const TARGET = new Date('2026-05-19T00:00:00');
    function setDigit(id, char) {
      const el = document.getElementById(id);
      if (el.textContent !== char) {
        el.classList.remove('anim');
        void el.offsetWidth;
        el.textContent = char;
        el.classList.add('anim');
      }
    }
    function update() {
      const diff = Math.max(0, TARGET - Date.now());
      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      setDigit('d0', String(days).padStart(2,'0')[0]);
      setDigit('d1', String(days).padStart(2,'0')[1]);
      setDigit('h0', String(hours).padStart(2,'0')[0]);
      setDigit('h1', String(hours).padStart(2,'0')[1]);
      setDigit('m0', String(minutes).padStart(2,'0')[0]);
      setDigit('m1', String(minutes).padStart(2,'0')[1]);
      setDigit('s0', String(seconds).padStart(2,'0')[0]);
      setDigit('s1', String(seconds).padStart(2,'0')[1]);
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
